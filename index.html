<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="header-wrapper">
    <div class="pizza-header-container">
        <p>Pizza Party!</p>
        <img class="pizza-header-img" src="img/pizza.png" alt="Pizza">
    </div>
    </section>
<section class="pizza-party-wrapper">
    <div class="pizza-party-container">
    <img class="pizza-party-img" src="img/pizza party.jpg" alt="Pizza party">
    <p class="pizza-party-img-overlay">A Pizza Party</p>
    </div>
    <div class="pizza-party-description">
        <h1>About</h1>
        <p>We're going to have a pizza party!</p>
    </div>
</section>
<h1>Your Hosts</h1>
<section class="host-wrapper">
    <div class="host-container">
<img class="host-img" src="img/lady-thumbs-up.jpg" alt="man">
<div class="host-description">
<h4 class="host-name">Jane Doe</h4>
<p class="host-role">She is the mastermind of this project</p>
</div>
</div>
<div class="host-container">
<img class="host-img" src="img/thumbs-up.jpg" alt="man">
<div class="host-description">
    <h4 class="host-name">John Doe</h4>
    <p class="host-role">He just laid back</p>
    </div>
</div>
</section>
</body>
</html>
